<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Anúncio - Carro</title>
    <!-- Ligação com o ficheiro CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Anunciar Veículo</h2>
        
        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Formulário enviado com sucesso!');">
            
            <!-- Campo de Texto -->
            <div class="form-group">
                <label for="titulo">Título do Anúncio</label>
                <input type="text" id="titulo" name="titulo" placeholder="Ex: Honda Civic 2020 Impecável" required>
            </div>

            <!-- Select (Caixa de Seleção) -->
            <div class="form-group">
                <label for="marca">Marca do Carro</label>
                <select id="marca" name="marca" required>
                    <option value="" disabled selected>Selecione uma marca...</option>
                    <option value="toyota">Toyota</option>
                    <option value="honda">Honda</option>
                    <option value="volkswagen">Volkswagen</option>
                    <option value="chevrolet">Chevrolet</option>
                    <option value="fiat">Fiat</option>
                    <option value="outra">Outra</option>
                </select>
            </div>

            <!-- Campos Numéricos lado a lado -->
            <div class="form-row">
                <div class="form-group flex-1">
                    <label for="ano">Ano</label>
                    <input type="number" id="ano" name="ano" min="1950" max="2026" placeholder="Ex: 2020" required>
                </div>
                <div class="form-group flex-1">
                    <label for="preco">Preço (R$)</label>
                    <input type="number" id="preco" name="preco" placeholder="Ex: 85000" required>
                </div>
            </div>

            <!-- Radio Buttons (Escolha Única) -->
            <div class="form-group">
                <label>Condição do Veículo</label>
                <div class="radio-group">
                    <label><input type="radio" name="condicao" value="novo" required> Novo (0km)</label>
                    <label><input type="radio" name="condicao" value="seminovo"> Seminovo</label>
                    <label><input type="radio" name="condicao" value="usado"> Usado</label>
                </div>
            </div>

            <!-- Checkboxes (Múltipla Escolha) -->
            <div class="form-group">
                <label>Opcionais (Marque os que o carro possui)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="opcionais" value="ar_condicionado"> Ar Condicionado</label>
                    <label><input type="checkbox" name="opcionais" value="automatico"> Câmbio Automático</label>
                    <label><input type="checkbox" name="opcionais" value="banco_couro"> Bancos de Couro</label>
                </div>
            </div>

            <!-- Textarea (Texto longo) -->
            <div class="form-group">
                <label for="descricao">Descrição Detalhada</label>
                <textarea id="descricao" name="descricao" rows="4" placeholder="Fale sobre quilometragem, revisões, IPVA..." required></textarea>
            </div>

            <!-- Botão de Envio -->
            <button type="submit" class="submit-btn">Publicar Anúncio</button>

        </form>
    </div>

</body>
</html>
