<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Anúncio - Carro</title>
    <style>
        /* Reset básico para manter o layout consistente */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .radio-group, .checkbox-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .radio-group label, .checkbox-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button.submit-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Anunciar Veículo</h2>
        
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="titulo">Título do Anúncio</label>
                <input type="text" id="titulo" name="titulo" placeholder="Ex: Honda Civic 2020 Impecável" required>
            </div>

            <div class="form-group">
                <label for="marca">Marca do Carro</label>
                <select id="marca" name="marca" required>
                    <option value="" disabled selected>Selecione uma marca...</option>
                    <option value="toyota">Toyota</option>
                    <option value="honda">Honda</option>
                    <option value="volkswagen">Volkswagen</option>
                    <option value="chevrolet">Chevrolet</option>
                    <option value="fiat">Fiat</option>
                    <option value="outra">Outra</option>
                </select>
            </div>

            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label for="ano">Ano</label>
                    <input type="number" id="ano" name="ano" min="1950" max="2025" placeholder="Ex: 2020" required>
                </div>
                <div style="flex: 1;">
                    <label for="preco">Preço (R$)</label>
                    <input type="number" id="preco" name="preco" placeholder="Ex: 85000" required>
                </div>
            </div>

            <div class="form-group">
                <label>Condição do Veículo</label>
                <div class="radio-group">
                    <label><input type="radio" name="condicao" value="novo" required> Novo (0km)</label>
                    <label><input type="radio" name="condicao" value="seminovo"> Seminovo</label>
                    <label><input type="radio" name="condicao" value="usado"> Usado</label>
                </div>
            </div>

            <div class="form-group">
                <label>Opcionais (Marque os que o carro possui)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="opcionais" value="ar_condicionado"> Ar Condicionado</label>
                    <label><input type="checkbox" name="opcionais" value="automatico"> Câmbio Automático</label>
                    <label><input type="checkbox" name="opcionais" value="banco_couro"> Bancos de Couro</label>
                </div>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição Detalhada</label>
                <textarea id="descricao" name="descricao" rows="4" placeholder="Fale sobre quilometragem, revisões, IPVA..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Publicar Anúncio</button>

        </form>
    </div>

</body>
</html>
